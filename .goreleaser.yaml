version: 2

project_name: qoconv

before:
  hooks:
    - go mod tidy

builds:
  - id: qoconv
    main: ./cmd/qoconv
    binary: qoconv
    env:
      - CGO_ENABLED=0
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

release:
  draft: false
